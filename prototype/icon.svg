<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F0C850"/>
      <stop offset="1" stop-color="#C49B1A"/>
    </linearGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0B0F1E"/>
      <stop offset="1" stop-color="#060810"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- angular frame -->
  <polygon points="256,36 476,146 476,366 256,476 36,366 36,146" fill="none" stroke="url(#gold)" stroke-width="14"/>
  <polygon points="256,72 444,166 444,346 256,440 68,346 68,166" fill="none" stroke="#DC2626" stroke-width="4" opacity="0.55"/>
  <!-- seam slash -->
  <polygon points="130,330 382,150 402,178 150,358" fill="#DC2626" opacity="0.85"/>
  <!-- CU monogram -->
  <text x="256" y="318" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-size="190" font-weight="900" fill="url(#gold)" letter-spacing="4">CU</text>
</svg>
